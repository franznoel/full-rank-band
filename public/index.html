
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Rank Band</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link href="styles/main.css" rel="stylesheet">
</head>
<body>
    <!-- Hero Section -->
    <div class="hero-section" id="hero-section">
        <div>
            <h1 class="hero-title" data-page-field="heroTitle">FULL RANK</h1>
            <p class="h4" data-page-field="heroSubtitle">Indie Rock Night</p>
            <p class="h5" data-page-field="heroDate">Dec 28 - 9 PM</p>
        </div>
    </div>

    <!-- Event Details -->
    <div class="event-details">
        <div id="home-content">
            <h2 class="fw-bold text-uppercase" data-page-field="venueName">Moon Moon's Bar & Cafe</h2>
            <p data-page-field="addressLine1">Triangle Island Plaza, 2nd Floor Narra Street</p>
            <p data-page-field="addressLine2">Shopping - Bacolod City</p>
            <h3 class="text-danger fw-bold mt-3" data-page-field="callout">NO DOOR CHARGE</h3>
        </div>
    </div>

    <section class="events-section" id="events-section" hidden>
        <div class="events-wrap">
            <h2>Upcoming Events</h2>
            <div class="events-grid" id="events-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <div class="footer">
        <p data-page-field="footerText">&copy; 2024 Full Rank | All Rights Reserved</p>
    </div>

    <script src="/__/firebase/10.12.5/firebase-app-compat.js"></script>
    <script src="/__/firebase/10.12.5/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/10.12.5/firebase-storage-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="scripts/firebase-app.js"></script>
    <script src="scripts/site.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-pp6JgyFbGVttf8mSCZ8nDW8h9TnhBt2cv/O6qzZ+3Kr8NDjl7Azqphw70W5sye25" crossorigin="anonymous"></script>
</body>
</html>
